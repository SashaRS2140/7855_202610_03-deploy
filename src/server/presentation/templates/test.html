{% extends "base.html" %}

{% block title %}Customizable Cube{% endblock %}

{% block content %}
<div style="position: relative; width: 100%; height: 80vh; background: #000;">
    <div id="canvas-container" style="width: 100%; height: 100%;"></div>

    <div style="position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10;">
        <h1>Glowing Cube</h1>
        <p>Interactive Color & Motion</p>
    </div>

    <div style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; align-items: center; z-index: 20;">

        <input type="color" id="cube-color" value="#ffaa00" style="
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background: none;
        ">

        <button id="toggle-breath" style="
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-family: sans-serif;
            cursor: pointer;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;">
            Turn Breathing OFF
        </button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/"
    }
  }
</script>

<script type="module" src="{{ url_for('web.static', filename='js/cube.js') }}"></script>
{% endblock %}
