{% extends "base.html" %}

{% block title %}Sign Up - CUBE{% endblock %}

{% block content %}
<div class="login-container">

    <div class="card">
        <div class="logo-container card-logo">
            <div class="logo-sq-orange"></div>
            <div class="logo-sq-red"></div>
        </div>

        <h1>CREATE ACCOUNT</h1>
        <p class="subtitle">JOIN THE CUBE</p>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('web.signup') }}">
            <div class="form-group">
                <input type="text" name="email" placeholder="email" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="password" required>
            </div>

            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="confirm password" required>
            </div>

            <button type="submit" class="btn-primary">SIGN UP</button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="{{ url_for('web.login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
