{% if error %}
    <div class="alert error">{{ error }}</div>
{% endif %}

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert success">Saved Successfully!</div>
    {% endif %}
{% endwith %}

<form hx-post="{{ url_for('web.profile') }}"
      hx-target="this"
      hx-swap="outerHTML">

    <label for="first_name">First Name:</label>
    <input type="text" name="first_name" value="{{ profile.get('first_name', '') }}" required><br><br>

    <label for="last_name">Last Name:</label>
    <input type="text" name="last_name" value="{{ profile.get('last_name', '') }}" required><br><br>

    <label for="student_id">Student ID:</label>
    <input type="text" name="student_id" value="{{ profile.get('student_id', '') }}" required><br><br>

    <button type="submit">Save Profile</button>
</form>
