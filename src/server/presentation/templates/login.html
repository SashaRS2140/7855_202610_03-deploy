{% extends "base.html" %}

{% block title %}Login - CUBE{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card login-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access The CUBE</p>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('web.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" placeholder="e.g. jdoe24" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">LOGIN</button>
        </form>

        <div class="footer-links">
            <p>New User? <a href="{{ url_for('web.signup') }}">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
