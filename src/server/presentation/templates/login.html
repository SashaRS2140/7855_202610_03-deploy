{% extends "base.html" %}

{% block title %}Login - CUBE{% endblock %}

{% block content %}
<div class="login-container">

    <div class="card login-card">
        <div class="logo-container card-logo">
            <div class="logo-sq-orange"></div>
            <div class="logo-sq-red"></div>
        </div>
        <h1>LOGIN</h1>
        <p class="subtitle">ENTER THE CUBE -- CONTROL YOUR MIND</p>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <form id="login-form">
            <input type="text" id="email" name="email" placeholder="email" required><br>

            <input type="password" id="password" name="password" placeholder="password" required><br>

            <button type="submit" class="btn-primary">LOGIN</button>
        </form>
<!--
        <form method="POST" action="{{ url_for('web.login') }}">
            <div class="form-group">
                <input type="text" name="username" placeholder="username" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">LOGIN</button>
        </form>
-->
        <div class="footer-links">
            <p>New User? <a href="{{ url_for('web.signup') }}">Create Account</a></p>
        </div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
            import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

            //const firebaseConfig = {apiKey: {{ api_key }}};

            const firebaseConfig = {
              apiKey: "AIzaSyAyuzcT80Cgh91lC2-eQLOtZyRHl0ipN68",
              authDomain: "the-cube-7885.firebaseapp.com",
              projectId: "the-cube-7885",
              storageBucket: "the-cube-7885.firebasestorage.app",
              messagingSenderId: "492034233693",
              appId: "1:492034233693:web:83daaf2dfe83de6030c4b4"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            const form = document.getElementById("login-form");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();  // stop normal POST

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                try {
                    // 1. Sign in with Firebase
                    const userCred = await signInWithEmailAndPassword(auth, email, password);

                    // 2. Get ID token
                    const idToken = await userCred.user.getIdToken();

                    // 3. Send token to Flask
                    const res = await fetch("/login", {
                        method: "POST",
                        headers: {
                            "Authorization": "Bearer " + idToken
                        }
                    });

                    if (res.redirected) {
                        window.location.href = res.url;
                    } else {
                        alert("Login failed");
                    }

                } catch (err) {
                    alert("Login error: " + err.message);
                }
            });
        </script>

    </div>
</div>
{% endblock %}
