{% extends "base.html" %}

{% block title %}Login - CUBE{% endblock %}

{% block content %}
<div class="login-container">

    <div class="card login-card">
        <div class="logo-container card-logo">
            <div class="logo-sq-orange"></div>
            <div class="logo-sq-red"></div>
        </div>
        <h1>LOGIN</h1>
        <p class="subtitle">ENTER THE CUBE -- CONTROL YOUR MIND</p>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('web.login') }}">
            <div class="form-group">
                <input type="text" name="username" placeholder="username" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">LOGIN</button>
        </form>

        <div class="footer-links">
            <p>New User? <a href="{{ url_for('web.signup') }}">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
