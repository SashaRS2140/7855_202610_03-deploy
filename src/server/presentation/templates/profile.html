<!DOCTYPE html>
<html>

<link rel="stylesheet" href="{{ url_for('web.static', filename='style.css') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App</title>
    <style>
        /* Basic Mobile Styles */
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        table { display: block; overflow-x: auto; } /* Allows horizontal scroll for the table on small screens */
    </style>
</head>

<body>
    <h1>Create or Edit Your Profile</h1>
    {% if error %}
    <p style="color: red; border: 1px solid red; padding: 10px; background-color: #ffe6e6;">
        <strong>Error:</strong> {{ error }}
    </p>
    {% endif %}
    <form method="POST" action="{{ url_for('web.profile') }}">
        <label for="first_name">First Name:</label>
        <input type="text" name="first_name" value="{{ profile.get('first_name', '') }}" required><br><br>

        <label for="last_name">Last Name:</label>
        <input type="text" name="last_name" value="{{ profile.get('last_name', '') }}" required><br><br>

        <label for="student_id">Student ID:</label>
        <input type="text" name="student_id" value="{{ profile.get('student_id', '') }}" required><br><br>

        <button type="submit">Save Profile</button>
    </form>
    <br>
    <a href="{{ url_for('web.home') }}">Go back to Dashboard</a>
</body>

</html>
