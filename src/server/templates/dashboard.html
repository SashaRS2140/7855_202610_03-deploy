{% extends "base.html" %}

{% block title %}Dashboard - CUBE{% endblock %}

{% block content %}
<div class="task-widget-container">

    <div class="task-card">

        <div id="cube-wrapper"></div>

        <div class="card-content-layer">

            <div class="task-selector-wrapper">
                <select class="task-dropdown" id="taskSelect">
                    <option value="" disabled {% if not tasks %}selected{% endif %}>SELECT A TASK...</option>

                    {% for task in tasks %}
                        <option value="{{ task.name }}">{{ task.name }}</option>
                    {% endfor %}
                    <option value="new_task_trigger">+ CREATE NEW TASK</option>
                </select>

                <div id="new-task-form" class="new-task-form hidden">
                    <input type="text" id="newTaskInput" class="task-dropdown-input" placeholder="TASK NAME..." maxlength="20">
                    <button id="saveNewTaskBtn" class="btn-icon btn-glass btn-small" title="Save Task">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                    <button id="cancelNewTaskBtn" class="btn-icon btn-glass btn-small" title="Cancel">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
           <div class="timer-row">
                <div></div>

                <div id="timer-display" class="timer-digits">10:00</div>

                <div class="timer-controls">
                    <button id="saveTimerBtn" class="btn-icon btn-glass hidden" title="Save New Time">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    </button>
                </div>
            </div>

            <div style="flex: 1; min-height: 200px;"></div>

            <div class="playback-controls">
                <button class="btn-large btn-glass" id="breathingBtn" title="Toggle breathing">
                    Pause
                </button>

                <div class="color-picker-wrapper">
                    <button id="color-trigger" class="color-trigger" style="background-color: #ffaa00;"></button>
                    <div id="color-menu" class="color-menu"></div>
                </div>
            </div>

        </div>
    </div>

   <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="{{ url_for('dashboard.static', filename='js/dashboard.js') }}"></script>
</div>

{% endblock %}
