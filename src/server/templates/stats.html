{% extends "base.html" %}

{% block title %}Stats - CUBE{% endblock %}

{% block content %}
<div class="stats-dashboard">
    <h1 class="stats-title">Meditation Stats</h1>

    <div class="stats-hero-grid">
        <div class="stat-box">
            <span class="stat-label">Total Sessions</span>
            <div class="stat-value" id="totalSessions">0</div>
        </div>
        <div class="stat-box">
            <span class="stat-label">Current Streak</span>
            <div class="stat-value">
                <span id="currentStreak">0</span><span class="stat-unit">days</span>
            </div>
        </div>
        <div class="stat-box full-width">
            <span class="stat-label">Total Meditation Time</span>
            <div class="stat-value">
                <span id="totalHours">0</span><span class="stat-unit">hrs</span>
                <span id="totalMinutes">0</span><span class="stat-unit">min</span>
            </div>
        </div>
    </div>

    <div class="intensity-map-section">
        <div class="map-header">
            <h2>Intensity Map</h2>
            <span>Last 6 Months</span>
        </div>

        <div class="map-container">
            <div class="floating-days">
                <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
            </div>

            <div class="scrollable-heatmap" id="verticalHeatmap">
                </div>
        </div>

        <div class="map-legend">
            <span>Low Intensity</span>
            <div class="legend-swatches">
                <div class="swatch-0"></div>
                <div class="swatch-1"></div>
                <div class="swatch-2"></div>
                <div class="swatch-3"></div>
                <div class="swatch-4"></div>
            </div>
            <span>Deep Ember</span>
        </div>
    </div>

    <div id="dayPopover" class="day-popover">
        <div class="popover-header">
            <h3 id="popoverDate">Select a day</h3>
            <button id="closePopover" class="btn-small btn-glass">&times;</button>
        </div>
        <div class="popover-stats-grid">
            <div class="pop-stat">
                <span class="pop-label">Sessions</span>
                <div class="pop-val" id="popoverCount">0</div>
            </div>
            <div class="pop-stat">
                <span class="pop-label">Total Time</span>
                <div class="pop-val" id="popoverTime">0m</div>
            </div>
        </div>
    </div>
</div>


<script type="module" src="{{ url_for('dashboard.static', filename='js/stats.js') }}"></script>
{% endblock %}
