<!DOCTYPE html>
<html>

<link rel="stylesheet" href="{{ url_for('web.static', filename='style.css') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App</title>
    <style>
        /* Basic Mobile Styles */
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        table { display: block; overflow-x: auto; } /* Allows horizontal scroll for the table on small screens */
    </style>
</head>
<body>
    <h1>Student Login</h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{{ url_for('web.login') }}">
        <label for="username">Username:</label>
        <input type="text" name="username" required><br><br>

        <label for="password">Password:</label>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
